services:
  - type: web
    name: loot-deal-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AMAZON_AFFILIATE_TAG
        sync: false
      - key: EARNKARO_USER_ID
        sync: false
      - key: FLIPKART_AFFILIATE_ID
        sync: false
