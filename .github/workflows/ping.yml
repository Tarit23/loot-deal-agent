name: Keep Bot Awake

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App
        run: |
          curl -s https://loot-deal-agent.onrender.com > /dev/null
          echo "Pinged Render app at $(date)"
